<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tuấn ❤️ Anh</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
overflow:hidden;
background:#ff6bb5;
color:white;
text-align:center;
height:100vh;
}

/* bầu trời sao */

.stars{
position:fixed;
width:100%;
height:100%;
background:radial-gradient(white 1px, transparent 1px);
background-size:40px 40px;
animation:moveStars 60s linear infinite;
opacity:0.4;
}

@keyframes moveStars{
from{background-position:0 0;}
to{background-position:1000px 500px;}
}

/* dải ngân hà */

.galaxy{
position:fixed;
width:200%;
height:200%;
background:radial-gradient(circle,#ff9ed6,transparent 60%);
transform:rotate(30deg);
animation:spin 120s linear infinite;
opacity:0.3;
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

/* thiệp mở */

#intro{
position:fixed;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:#ff4fa3;
z-index:10;
}

.book{
width:220px;
height:150px;
background:white;
color:#ff4fa3;
display:flex;
justify-content:center;
align-items:center;
border-radius:10px;
font-size:20px;
cursor:pointer;
transition:1s;
}

.book:hover{
transform:rotateY(20deg);
}

/* main */

#main{
display:none;
padding-top:40px;
}

/* tên */

#name{
font-size:38px;
text-shadow:0 0 20px pink;
}

/* counter */

#time{
margin-top:10px;
font-size:18px;
}

/* ring 3D */

#ring{
font-size:70px;
margin-top:10px;
animation:ringSpin 4s linear infinite;
}

@keyframes ringSpin{
from{transform:rotateY(0deg)}
to{transform:rotateY(360deg)}
}

/* timeline */

.timeline{
margin-top:20px;
font-size:18px;
line-height:30px;
}

/* slideshow */

.slider{
width:80%;
max-width:320px;
margin:auto;
margin-top:20px;
border-radius:20px;
overflow:hidden;
box-shadow:0 0 20px pink;
}

.slider img{
width:100%;
height:330px;
object-fit:cover;
}

/* button */

.love{
margin-top:20px;
padding:15px 30px;
border:none;
border-radius:30px;
font-size:20px;
background:white;
color:#ff4fa3;
}

/* heart */

.heart{
position:fixed;
font-size:24px;
animation:float 5s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}

/* firework */

.fire{
position:fixed;
font-size:35px;
}

</style>
</head>

<body>

<div class="stars"></div>
<div class="galaxy"></div>

<!-- mở thiệp -->

<div id="intro">

<h1>Một điều Tuấn muốn nói 💌</h1>

<div class="book" onclick="start()">Mở Thiệp</div>

</div>

<!-- nội dung -->

<div id="main">

<h1 id="name">TUẤN ❤️ ANH</h1>

<div id="time"></div>

<div id="ring">💍</div>

<div class="timeline">
💞 2024 — Bắt đầu yêu nhau<br>
💖 2025 — Cùng nhau nhiều kỷ niệm<br>
💍 2026 — Anh muốn cưới em
</div>

<div class="slider">
<img id="slide" src="anh1.jpg">
</div>

<button class="love" onclick="love()">Đồng Ý Làm Vợ Anh</button>

</div>

<audio id="music" loop>
<source src="nhac.mp3" type="audio/mpeg">
</audio>

<script>

/* mở thiệp */

function start(){

document.getElementById("intro").style.display="none"
document.getElementById("main").style.display="block"

document.getElementById("music").play()

}

/* đếm thời gian yêu */

let startDate=new Date("2024-10-19T00:00:00")

function time(){

let now=new Date()

let diff=now-startDate

let d=Math.floor(diff/(1000*60*60*24))
let h=Math.floor(diff/(1000*60*60))%24
let m=Math.floor(diff/(1000*60))%60
let s=Math.floor(diff/1000)%60

document.getElementById("time").innerHTML=
"Anh đã yêu em "+d+" ngày "+h+" giờ "+m+" phút "+s+" giây 💞"

}

setInterval(time,1000)

/* slideshow */

let imgs=["anh1.jpg","anh2.jpg","anh3.jpg","anh4.jpg"]

let i=0

setInterval(()=>{

i++
if(i>=imgs.length){i=0}

document.getElementById("slide").src=imgs[i]

},3000)

/* tim bay */

function heart(){

let h=document.createElement("div")

h.className="heart"
h.innerHTML="💖"

h.style.left=Math.random()*100+"vw"

document.body.appendChild(h)

setTimeout(()=>{h.remove()},5000)

}

setInterval(heart,400)

/* pháo hoa */

function love(){

for(let i=0;i<60;i++){

let f=document.createElement("div")

f.className="fire"

f.innerHTML="🎆"

f.style.left=Math.random()*100+"vw"
f.style.top=Math.random()*100+"vh"

document.body.appendChild(f)

setTimeout(()=>{f.remove()},1500)

}

alert("Anh yêu em rất nhiều ❤️")

}

</script>

</body>
</html>
